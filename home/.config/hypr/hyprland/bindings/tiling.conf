# Close windows
bindd = $mainMod, Q, Close window, killactive,

# Session
bindd = $mainMod ALT, L, Lock Session, exec, loginctl lock-session

# Control tiling
bindd = $mainMod, O, Toggle window split, togglesplit, # dwindle
bindd = $mainMod, P, Pseudo window, pseudo, # dwindle
bindd = $mainMod, T, Toggle window floating/tiling, togglefloating,
bindd = $mainMod, F, Full screen, fullscreen, 0
bindd = $mainMod ALT, F, Full width, fullscreen, 1

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Swap active window with the one next to it with mainMod + SHIFT + arrow keys
bindd = $mainMod SHIFT, LEFT, Swap window to the left, swapwindow, l
bindd = $mainMod SHIFT, RIGHT, Swap window to the right, swapwindow, r
bindd = $mainMod SHIFT, UP, Swap window up, swapwindow, u
bindd = $mainMod SHIFT, DOWN, Swap window down, swapwindow, d

# Resize active window
bindde = $mainMod, code:20, Expand window left, resizeactive, -100 0    # - key
bindde = $mainMod, code:21, Shrink window left, resizeactive, 100 0     # = key
bindde = $mainMod SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindde = $mainMod SHIFT, code:21, Expand window down, resizeactive, 0 100


################
### VIM MODE ###
################

# Move focus with mainMod + hjkl
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Swap active window with the one next to it with mainMod + SHIFT + hjkl
bindd = $mainMod SHIFT, H, Swap window to the left, swapwindow, l
bindd = $mainMod SHIFT, L, Swap window to the right, swapwindow, r
bindd = $mainMod SHIFT, K, Swap window up, swapwindow, u
bindd = $mainMod SHIFT, J, Swap window down, swapwindow, d

# Resize active window with mainMod + CTRL + hjkl
binde = $mainMod CTRL, H, resizeactive, -100 0
binde = $mainMod CTRL, L, resizeactive, 100 0
binde = $mainMod CTRL, K, resizeactive, 0 -100
binde = $mainMod CTRL, J, resizeactive, 0 100