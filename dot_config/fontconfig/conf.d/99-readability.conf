<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- ================================================================
       GLOBAL FONT RENDERING SETTINGS
       Optimized for modern LCD screens with RGB subpixel layout
       ================================================================ -->

  <match target="font">
    
    <!-- Enable antialiasing (smoothing) -->
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>

    <!-- Enable hinting for better alignment to pixel grid -->
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>

    <!-- Hinting style: "hintslight" for natural shapes
         Alternative: "hintfull" for maximum crispness (may look artificial)
         Alternative: "hintmedium" for balance between the two -->
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>

    <!-- Subpixel rendering for LCD screens (RGB layout)
         This is the most important setting for sharp text on LCD screens
         Change to "bgr" if colors appear fringed/wrong -->
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>

    <!-- LCD filter: "lcdlight" for sharper rendering
         This reduces color fringing while maintaining sharpness
         Alternative: "lcddefault" (more blur, less fringing)
         Alternative: "lcdlegacy" (sharper but more fringing) -->
    <edit name="lcdfilter" mode="assign">
      <const>lcdlight</const>
    </edit>

    <!-- Use autohinter for consistent results across fonts
         The autohinter often produces better results than native hinting
         Set to false if you prefer native font hinting -->
    <edit name="autohint" mode="assign">
      <bool>true</bool>
    </edit>

    <!-- Slight emboldening for better readability on LCD screens
         0.04 is subtle but improves readability without looking bold
         Remove this section if fonts look too heavy -->
    <edit name="embolden" mode="assign">
      <bool>false</bool>
    </edit>

  </match>

  <!-- ================================================================
       SIZE-SPECIFIC OPTIMIZATIONS
       ================================================================ -->

  <!-- For very small text (< 8px), use full hinting for maximum clarity -->
  <match target="font">
    <test name="pixelsize" compare="less">
      <double>8</double>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintfull</const>
    </edit>
  </match>

  <!-- For large text (> 20px), disable hinting for smoother curves -->
  <match target="font">
    <test name="pixelsize" compare="more">
      <double>20</double>
    </test>
    <edit name="hintstyle" mode="assign">
      <const>hintnone</const>
    </edit>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- ================================================================
       FONT-SPECIFIC RENDERING OVERRIDES
       ================================================================ -->

  <!-- Bitmap fonts: disable antialiasing and hinting -->
  <match target="font">
    <test name="scalable" compare="eq">
      <bool>false</bool>
    </test>
    <edit name="antialias" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hinting" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- Noto Sans: Better with native hinting -->
  <match target="font">
    <test name="family" qual="any">
      <string>Noto Sans</string>
    </test>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- Noto Serif: Better with native hinting -->
  <match target="font">
    <test name="family" qual="any">
      <string>Noto Serif</string>
    </test>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- Noto Sans Mono: Better with native hinting -->
  <match target="font">
    <test name="family" qual="any">
      <string>Noto Sans Mono</string>
    </test>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
  </match>

  <!-- JetBrains Mono: Excellent native hinting, use it -->
  <match target="font">
    <test name="family" qual="any">
      <string>JetBrainsMono Nerd Font Mono</string>
    </test>
    <edit name="autohint" mode="assign">
      <bool>false</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintslight</const>
    </edit>
  </match>

</fontconfig>
