# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
font_size 12.0
# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME

# Quality of life
scrollback_lines 20000
cursor_shape beam

# Deafult shell
shell fish

# Window spacing (Hyprland-friendly)
window_padding_width 8

# Key maps
map ctrl+f      launch --location=hsplit --allow-remote-control kitty +kitten kitty-kitten-search/search.py @active-kitty-window-id

# TERM
term xterm-kitty
